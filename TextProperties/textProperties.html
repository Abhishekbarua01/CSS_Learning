<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Properties</title>
    <link rel="stylesheet" href="textProperties.css">
</head>
<body>
    <!-- color: Changes text color. -->
     <p>Hello CSS</p>

     <!-- text-align: Controls horizontal alignment -->
      <!-- Values: left, center, right, justify -->

      <h1>Welcome</h1>
      <h2>Hello</h2>
      <h3>Good Night</h3>

    <!-- text-decoration: Adds or removes decoration. -->
     <!-- Values: underline, overline, line-through, none -->

     <div>
     <p>HTML</p>
     <h1>CSS</h1>
     <h2>JavaScript</h2>
     </div>


     <!-- text-transform: Changes letter case. -->
     <section>
        <h3>hello World</h3>
        <h4>GOOD BYE</h4>
     </section>


     <h5>This is learning of second day of css.</h5>
</body>
</html>
