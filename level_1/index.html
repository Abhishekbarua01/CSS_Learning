<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level One CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <Section>
        <!-- Practice no. 1 -->
    <!-- Element Selector: change all headings to blue and page background to light gray. -->

    <h1>Welcome</h1>
    <h2>Learning CSS</h2>
    <p>This is a paragraph.</p>

    </Section>

    <section>
        <!-- Practice 2 -->
         <!-- Class Selector: Style only special paragraphs. -->

         <p class="note">Important Note</p>

         <p>This is normal text</p>

         <p class="note">Read carefully</p>
    </section>

    <section>
        <!-- Practice 3 -->
         <!-- ID Selector: Create a highlighted title. -->

         <h1 id="mainTitle">My Website</h1>
    </section>

    <!-- Practice 4 -->
     <!-- Universal Selector: Apply style to all elements. -->
    <h1>Hello</h1>
    <p>paragraph</p>
    <button>Click me!</button>

    <!-- Practice 5 -->
     <!-- Descendent Selector: Style paragraphs only inside a div. -->

     <div>
        <p>Inside Div</p>
     </div>

     <p>Outside Div</p>

     <!-- Practice 6 -->
    <!-- Child Selector -->

    <div>
        <p>Direct Child</p>

        <section>
            <p>Nested Child</p>
        </section>

    </div>


    <h1>Challenge for practice</h1>

    <h1>Welcome To CSS</h1>

    <p>This paragraph should be white.</p>

    <button>Click me!</button>

</body>
</html>
